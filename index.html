<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フロントラインカレンダー</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>フロントラインカレンダー</h1>
  <p>毎日のルールを一目でチェック 🗓️</p>
</header>

<div class="container">
  <div id="today-banner">
    <div class="banner-content">
      <div class="label">本日の戦場</div>
      <div class="map-name" id="banner-name">取得中...</div>
    </div>
    <div class="today-date" id="banner-date">----年--月--日</div>
  </div>

  <div class="cal-nav">
    <button id="btn-prev">前月</button>
    <h2 id="cal-title">2026年 4月</h2>
    <button id="btn-next">次月</button>
  </div>

  <div class="calendar-wrap">
    <div class="cal-header-row">
      <span>日</span><span>月</span><span>火</span><span>水</span>
      <span>木</span><span>金</span><span>土</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:var(--col-saihyo)"></div>砕氷戦</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-onsal)"></div>オンサル</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-seal)"></div>シルロ</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-gaien)"></div>制圧戦</div>
  </div>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-date" style="font-size:0.85rem; color:var(--accent-red); font-weight:900; margin-bottom:5px;"></div>
    <div class="modal-map-name" id="modal-map-name"></div>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p>フロントラインのルールローテーション一目で確認！</p>
</footer>

<script src="script.js"></script>
</body>
</html>
