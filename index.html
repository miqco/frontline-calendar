<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フロントラインカレンダー</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== リセット & ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fafafa;        /* より白い背景 */
      --surface:      #ffffff;
      --header-bg:    #a52a2a;        /* 落ち着いた赤 */
      --accent-red:   #d32f2f;        /* 可愛らしい赤 */
      --accent-pink:  #ffecf0;        /* 柔らかなピンク */
      --border:       #f0e0e0;
      --text:         #4a4a4a;        /* 優しい黒 */
      --text-muted:   #888888;
      --text-white:   #ffffff;
      
      --shadow:       0 8px 20px rgba(211, 47, 47, 0.05);
      --shadow-md:    0 12px 30px rgba(211, 47, 47, 0.1);

      /* 今日ハイライト */
      --today-accent: #ff8a80;
      --today-bg:     #fff5f5;

      /* マップ別カラー（パステル調） */
      --col-saihyo:   #64b5f6; /* 青 */
      --col-onsal:    #ffb74d; /* 橙 */
      --col-seal:     #81c784; /* 緑 */
      --col-gaien:    #ba68c8; /* 紫 */
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(135deg, #b71c1c, #d32f2f);
      color: var(--text-white);
      text-align: center;
      padding: 35px 16px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-radius: 0 0 30px 30px;
      transition: background 0.6s ease;
    }
    header h1 {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      font-weight: 900;
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    header p {
      font-size: 0.9rem;
      font-weight: 700;
      background: rgba(255,255,255,0.25);
      display: inline-block;
      padding: 4px 18px;
      border-radius: 25px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 8px;
    }

    /* ===== 今日のマップ バナー ===== */
    #today-banner {
      background: var(--surface);
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--accent-pink);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #today-banner:hover {
      transform: scale(1.02);
    }
    .banner-content .label {
      color: var(--accent-red);
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .banner-content .map-name {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 900;
    }
    .today-date {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 700;
      background: var(--accent-pink);
      padding: 4px 12px;
      border-radius: 12px;
    }

    /* ===== カレンダーナビ ===== */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .cal-nav button {
      background: var(--surface);
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
      padding: 8px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 4px 0 var(--accent-pink);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cal-nav button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--accent-pink);
    }
    .cal-nav h2 {
      font-size: 1.3rem;
      font-weight: 900;
      min-width: 150px;
      text-align: center;
    }

    /* ===== カレンダーグリッド ===== */
    .calendar-wrap {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      width: 100%;
    }

    .cal-header-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #fffcfc;
      border-bottom: 1px solid var(--border);
    }
    .cal-header-row span {
      text-align: center;
      padding: 12px 0;
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--text-muted);
    }
    .cal-header-row span:nth-child(1) { color: #ff3366; } /* 日曜 */
    .cal-header-row span:nth-child(7) { color: #3399ff; } /* 土曜 */

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      width: 100%;
    }

    .cal-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 4px;
      min-height: 95px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      min-width: 0;
      transition: background 0.2s;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover {
      background: var(--accent-pink);
    }

    .cal-cell.is-today {
      background: var(--today-bg);
    }
    .cal-cell.is-today::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 3px solid var(--accent-red);
      pointer-events: none;
      border-radius: inherit;
      z-index: 1;
    }

    .day-num {
      font-size: 0.9rem;
      font-weight: 900;
    }
    .cal-cell.sun .day-num { color: #ff3366; }
    .cal-cell.sat .day-num { color: #3399ff; }

    /* マップラベル */
    .map-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
    }
    .map-badge {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.2;
      display: block;
      padding: 3px 2px;
      border-radius: 6px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      text-align: center;
      width: 100%;
      word-wrap: break-word;
    }
    .map-name-label { color: var(--text); background: rgba(255,255,255,0.8); }

    /* モバイルでの調整 */
    @media (max-width: 600px) {
      .container { padding: 0 4px; }
      .cal-cell {
        min-height: 80px;
        padding: 6px 2px;
        gap: 3px;
      }
      .day-num { font-size: 0.8rem; }
      .map-badge { 
        font-size: 0.65rem; 
        letter-spacing: -0.05em;
        white-space: normal;
        overflow: visible;
        padding: 4px 3px;
        line-height: 1.3;
      }
      .legend-item { padding: 5px 10px; font-size: 0.75rem; }
      .modal {
        max-height: 85vh;
        padding: 30px 20px;
      }
    }

    /* ===== 凡例 ===== */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 25px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--surface);
      padding: 6px 14px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* ===== 設定セクション ===== */
    .settings-section {
      margin-top: 50px;
      background: var(--surface);
      border-radius: 20px;
      padding: 25px;
      border: 2px dashed var(--accent-red);
      opacity: 0.9;
      box-shadow: var(--shadow);
    }
    .settings-section h3 {
      font-size: 1rem;
      color: var(--accent-red);
      margin-bottom: 15px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .settings-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .settings-grid button {
      background: #fff;
      border: 2px solid var(--border);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .settings-grid button:hover {
      border-color: var(--accent-red);
      background: var(--accent-pink);
      transform: scale(1.05);
    }
    .reset-btn {
      display: block;
      margin: 10px auto 0;
      background: #f5f5f5 !important;
      color: #666;
      border: 1px solid #ccc !important;
      padding: 5px 15px !important;
      font-size: 0.75rem !important;
    }

    /* ===== モーダル ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(211, 47, 47, 0.25);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 25px;
      padding: 35px 25px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
      position: relative;
      border: 4px solid var(--accent-pink);
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--accent-pink);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--accent-red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .modal-close:hover { transform: rotate(90deg); }

    .modal-map-name {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      color: var(--text);
      line-height: 1.3;
    }
    .modal-section {
      margin-bottom: 18px;
      background: #fffcfc;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--accent-pink);
    }
    .modal-section h3 {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--accent-red);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-section h3::before { content: "📌"; }
    .modal-section p, .modal-section li {
      font-size: 0.95rem;
      color: #555;
    }
    .modal-section ul {
      padding-left: 1.2em;
      list-style-type: '❤ ';
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  <h1>フロントラインカレンダー</h1>
  <p>毎日のルールを一目でチェック 🗓️</p>
</header>

<div class="container">
  <div id="today-banner">
    <div class="banner-content">
      <div class="label">本日の戦場</div>
      <div class="map-name" id="banner-name">取得中...</div>
    </div>
    <div class="today-date" id="banner-date">----年--月--日</div>
  </div>

  <div class="cal-nav">
    <button id="btn-prev">前月</button>
    <h2 id="cal-title">2026年 4月</h2>
    <button id="btn-next">次月</button>
  </div>

  <div class="calendar-wrap">
    <div class="cal-header-row">
      <span>日</span><span>月</span><span>火</span><span>水</span>
      <span>木</span><span>金</span><span>土</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:var(--col-saihyo)"></div>砕氷戦</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-onsal)"></div>オンサル</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-seal)"></div>シルロ</div>
    <div class="legend-item"><div class="legend-color" style="background:var(--col-gaien)"></div>制圧戦</div>
  </div>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-date" style="font-size:0.85rem; color:var(--accent-red); font-weight:900; margin-bottom:5px;"></div>
    <div class="modal-map-name" id="modal-map-name"></div>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p>フロントラインのルールローテーション一目で確認！</p>
</footer>

<script>
// ===== マップデータ =====
const MAPS = [
  {
    id: 0,
    name: 'フィールド・オブ・グローリー',
    shortName: '砕氷戦',
    rule: '砕氷戦',
    color: 'var(--col-saihyo)',
    icon: '❄',
    notes: {
      overview: 'フィールド上に出現する「氷」を砕いてポイントを獲得するマップです。',
      points: [
        '「アイストーム」を破壊して情報値を獲得',
        '大きい氷（大氷）は獲得量が多いので優先！',
        '敵プレイヤーを倒すとポイント獲得、自分が倒されると減少',
      ],
      tips: [
        '氷が出現するタイミングに合わせて移動を開始しよう',
        '自陣の近くの氷を守りつつ、他陣営の氷も隙があれば狙ってみて！',
      ],
    },
  },
  {
    id: 1,
    name: 'オンサル・ハカイル',
    shortName: 'オンサル',
    rule: '終節戦',
    color: 'var(--col-onsal)',
    icon: '⚔️',
    notes: {
      overview: '「無垢の土地」を占拠して継続的に情報値を獲得する、独自の「純粋な奪い合い」がメインのルールです。',
      points: [
        '「無垢の土地」を有効化（占拠）することで情報値を継続的に獲得',
        '土地にはランク（B/A/S）があり、ランクが高いほど獲得ポイントが多い！',
        '一度占拠した土地は、一定量を出し尽くすと消滅します',
      ],
      tips: [
        '次にどこで土地が出るか予兆をしっかり確認しよう',
        'Sランクの土地は争奪が激しいので、仲間としっかり協力してね！',
      ],
    },
  },
  {
    id: 2,
    name: 'シールロック',
    shortName: 'シルロ',
    rule: '争奪戦',
    color: 'var(--col-seal)',
    icon: '🏴',
    notes: {
      overview: 'ランダムに起動する「アラガントームストーン」を占拠・維持するマップです。',
      points: [
        '起動した「トームストーン」から情報値を継続的に抽出',
        '敵プレイヤーを倒すとポイント加算、倒されると減少',
      ],
      tips: [
        'トームストーンの残り残量に注意。なくなりそうなら次の場所へ移動準備！',
        '他陣営に挟まれないようにマップをこまめに見よう',
      ],
    },
  },
  {
    id: 3,
    name: '外縁遺跡群',
    shortName: '制圧戦',
    rule: '制圧戦',
    color: 'var(--col-gaien)',
    icon: '🏛',
    notes: {
      overview: '6つの拠点を占拠しつつ、中央に出現するターゲットを破壊するルールです。',
      points: [
        '拠点を占拠すると情報値を継続的に獲得（占拠数が多いほど増加）',
        '中央の高台に出現する「オートマトン・セクター」や「迎撃システム」を破壊して大量ポイント',
        '敵プレイヤーを倒すとポイント獲得',
      ],
      tips: [
        '拠点を1つは確実に維持するのが基本だよ',
        '中央のターゲット出現タイミング（一定間隔）を覚えて、逃さず攻撃しよう！',
        '他陣営の拠点を奪って妨害するのも効果的',
      ],
    },
  },
];

const INITIAL_BASE_DATE = new Date(2026, 3, 17); // 基準日: 4/17 = 砕氷戦
let BASE_DATE = new Date(INITIAL_BASE_DATE);

const savedBaseDate = localStorage.getItem('fl_base_date');
if (savedBaseDate) {
  BASE_DATE = new Date(savedBaseDate);
}

function updateRotation(selectedIdx) {
  const today = new Date();
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const newBaseDate = new Date(d);
  newBaseDate.setDate(d.getDate() - selectedIdx);
  BASE_DATE = newBaseDate;
  localStorage.setItem('fl_base_date', BASE_DATE.toISOString());
  renderBanner(today);
  renderCalendar();
  alert('ローテーションを更新したよ！✨');
}

function resetRotation() {
  BASE_DATE = new Date(INITIAL_BASE_DATE);
  localStorage.removeItem('fl_base_date');
  const today = new Date();
  renderBanner(today);
  renderCalendar();
  alert('初期設定にリセットしたよ！❄️');
}

function getMapIndex(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.round((d - BASE_DATE) / (1000 * 60 * 60 * 24));
  return ((diff % 4) + 4) % 4;
}

function getFullName(map) {
  return `${map.name} (${map.rule})`;
}

let currentYear, currentMonth;

function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  renderBanner(now);
  renderCalendar();
}

function renderBanner(date) {
  const idx = getMapIndex(date);
  const map = MAPS[idx];
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
  document.getElementById('banner-name').textContent = getFullName(map);
  document.getElementById('banner-name').style.color = map.color;
  document.getElementById('banner-date').textContent = date.toLocaleDateString('ja-JP', opts);
  document.getElementById('today-banner').style.borderColor = map.color;
  
  // ルールの色に応じてヘッダーの背景を変更
  const colorMap = {
    'var(--col-saihyo)': { rgb: '100, 181, 246', name: '砕氷戦' }, // 青
    'var(--col-onsal)': { rgb: '255, 183, 77', name: 'オンサル' }, // 橙
    'var(--col-seal)': { rgb: '129, 199, 132', name: 'シルロ' }, // 緑
    'var(--col-gaien)': { rgb: '186, 104, 200', name: '制圧戦' } // 紫
  };
  
  const colorInfo = colorMap[map.color];
  if (colorInfo) {
    const rgb = colorInfo.rgb;
    document.querySelector('header').style.background = `linear-gradient(135deg, rgba(${rgb}, 0.8), rgba(${rgb}, 0.6))`;
    // モーダルオーバーレイの背景もテーマカラーに変更
    document.getElementById('modal-overlay').style.background = `rgba(${rgb}, 0.25)`;
  }
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${currentYear}年 ${currentMonth + 1}月`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay  = new Date(currentYear, currentMonth + 1, 0);
  const startDow = firstDay.getDay();
  for (let i = 0; i < startDow; i++) {
    const d = new Date(currentYear, currentMonth, 1 - (startDow - i));
    grid.appendChild(makeCell(d, true));
  }
  for (let d = 1; d <= lastDay.getDate(); d++) {
    grid.appendChild(makeCell(new Date(currentYear, currentMonth, d), false));
  }
  const total = startDow + lastDay.getDate();
  const rem = total % 7;
  if (rem !== 0) {
    for (let i = 1; i <= (7 - rem); i++) {
      grid.appendChild(makeCell(new Date(currentYear, currentMonth + 1, i), true));
    }
  }
}

function makeCell(date, otherMonth) {
  const idx = getMapIndex(date);
  const map = MAPS[idx];
  const isToday = date.toDateString() === new Date().toDateString();
  const dow = date.getDay();
  const cell = document.createElement('div');
  cell.className = `cal-cell ${otherMonth ? 'other-month' : ''} ${isToday ? 'is-today' : ''} ${dow === 0 ? 'sun' : dow === 6 ? 'sat' : ''}`;
  cell.innerHTML = `
    <span class="day-num">${date.getDate()}</span>
    <div class="map-content">
      <span class="map-badge map-name-label" style="background:${otherMonth ? '' : map.color}22; color:${otherMonth ? '' : map.color}">
        ${map.icon}<br>${map.shortName}
      </span>
    </div>
  `;
  cell.onclick = () => openModal(date);
  return cell;
}

function openModal(date) {
  const idx = getMapIndex(date);
  const map = MAPS[idx];
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('modal-date').textContent = date.toLocaleDateString('ja-JP', opts);
  document.getElementById('modal-map-name').innerHTML = `${map.icon} ${getFullName(map)}`;
  document.getElementById('modal-map-name').style.color = map.color;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h3>ルール概要</h3>
      <p>${map.notes.overview}</p>
    </div>
    <div class="modal-section">
      <h3>ポイント獲得</h3>
      <ul>${map.notes.points.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <h3>戦意高揚システム</h3>
      <p>敵を倒したりアシストすると「戦意」が上がり、最大100（高揚V）まで蓄積します。攻撃力と回復量が最大1.5倍になるので、死なずに高揚を維持するのが勝利への近道です！</p>
    </div>
    <div class="modal-section">
      <h3>攻略のヒント</h3>
      <ul>${map.notes.tips.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').onclick = () => document.getElementById('modal-overlay').classList.remove('open');
document.getElementById('modal-overlay').onclick = (e) => { if (e.target.id === 'modal-overlay') document.getElementById('modal-overlay').classList.remove('open'); };
document.getElementById('btn-prev').onclick = () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); };
document.getElementById('btn-next').onclick = () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };

init();
</script>
</body>
</html>
